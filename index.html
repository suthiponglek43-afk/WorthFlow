            const displayMonthName = `${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;

            // Persistence
            useEffect(() => { localStorage.setItem('wf_accounts', JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem('wf_transactions', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('wf_budgets', JSON.stringify(budgets)); }, [budgets]);
            useEffect(() => { localStorage.setItem('wf_goals', JSON.stringify(goals)); }, [goals]);
            useEffect(() => { localStorage.setItem('wf_recurrings', JSON.stringify(recurrings)); }, [recurrings]);

            // PWA Install Prompt & Load Data Check
            useEffect(() => {
                const handler = (e) => { 
                    e.preventDefault(); setDeferredPrompt(e); setIsInstallable(true); 
                    if (!sessionStorage.getItem('wf_install_dismissed')) setShowInstallBanner(true);
                };
                window.addEventListener('beforeinstallprompt', handler);

                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(() => {});
                }

                const checkData = localStorage.getItem('wf_accounts');
                if (checkData) {
                    try {
                        const parsedData = JSON.parse(checkData);
                        if (Array.isArray(parsedData) && parsedData.length > 0) {
                            setAccounts(parsedData);
                        }
                    } catch (e) {
                        console.error('Error parsing data:', e);
                    }
                }

                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            // Auto-process Recurring Transactions
            useEffect(() => {
                const processRecurrings = () => {
                    const today = new Date();
                    const realCurrentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                    let hasChanges = false; const txsToAdd = [];

                    const newRecurrings = recurrings.map(r => {
                        if (r.lastProcessedMonth !== realCurrentMonthStr) {
                            const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
                            const triggerDay = r.recurringDay === -1 ? lastDayOfMonth : Math.min(r.recurringDay || 1, lastDayOfMonth);
                            
                            const targetDate = new Date(today.getFullYear(), today.getMonth(), triggerDay);
                            targetDate.setHours(0,0,0,0);
                            
                            const todayAtMidnight = new Date(today); todayAtMidnight.setHours(0,0,0,0);

                            if (todayAtMidnight >= targetDate) {
                                hasChanges = true;
                                txsToAdd.push({...r, triggerDate: targetDate});
                                return { ...r, lastProcessedMonth: realCurrentMonthStr };
                            }
                        }
                        return r;
                    });
                    
                    if (!hasChanges) return;
                    setRecurrings(newRecurrings);
                    setTransactions(prev => {
                        const newTxs = txsToAdd.map(r => ({
                            id: Date.now() + Math.random(), type: r.type, amount: r.amount, categoryId: r.categoryId,
                            accountId: r.accountId, date: r.triggerDate.toISOString(), note: 'รายการประจำอัตโนมัติ'
                        }));
                        return [...newTxs, ...prev];
                    });

                    setAccounts(prev => {
                        let accs = [...prev];
                        txsToAdd.forEach(r => {
                            const accIdx = accs.findIndex(a => a.id === r.accountId);
                            if(accIdx > -1) { accs[accIdx] = { ...accs[accIdx], balance: r.type === 'income' ? accs[accIdx].balance + r.amount : accs[accIdx].balance - r.amount }; }
                        });
                        return accs;
                    });
                };
                processRecurrings();
            }, [recurrings]);

            // --- CALCULATIONS ---
            const netWorth = useMemo(() => accounts.reduce((sum, acc) => sum + acc.balance, 0), [accounts]);
            const liquidAssets = useMemo(() => accounts.filter(a => ['bank', 'ewallet', 'crypto_wallet'].includes(a.type)).reduce((sum, acc) => sum + (acc.balance * ((acc.reservePercentage ?? 100) / 100)), 0), [accounts]);

            const monthlyBurnRate = useMemo(() => {
                const monthExpenses = transactions.filter(tx => {
                    const d = new Date(tx.date); const cat = CATEGORIES.find(c => c.id === tx.categoryId);
                    return tx.type === 'expense' && d.getMonth() === selectedDate.getMonth() && d.getFullYear() === selectedDate.getFullYear() && cat?.group !== 'saving' && cat?.group !== 'investment';
                }).reduce((sum, tx) => sum + tx.amount, 0);
                return monthExpenses || 15000;
            }, [transactions, selectedDate]);

            const runwayMonths = (liquidAssets / monthlyBurnRate).toFixed(1);

            const currentMonthBudgetData = useMemo(() => {
                const monthTx = transactions.filter(tx => {
                    const d = new Date(tx.date); return d.getMonth() === selectedDate.getMonth() && d.getFullYear() === selectedDate.getFullYear() && tx.type === 'expense';
                });
                return budgets.filter(b => b.month === currentMonthStr).map(b => {
                    const group = BUDGET_GROUPS.find(g => g.id === b.groupId) || { name: 'อื่นๆ', icon: '❓', colorClass: 'bg-slate-500' };
                    const groupCats = CATEGORIES.filter(c => c.budgetGroup === b.groupId).map(c => c.id);
                    const spent = monthTx.filter(tx => groupCats.includes(tx.categoryId)).reduce((s, tx) => s + tx.amount, 0);
                    return { ...group, limit: b.limit, spent, percent: Math.min(100, (spent/b.limit)*100), isOver: spent > b.limit };
                }).sort((a, b) => b.percent - a.percent);
            }, [transactions, budgets, selectedDate, currentMonthStr]);

            const comparisonData = useMemo(() => {
                const targetYear = selectedDate.getFullYear();
                const shortMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
                return shortMonths.map((m, i) => {
                    const txs = transactions.filter(tx => { const tD = new Date(tx.date); return tD.getFullYear() === targetYear && tD.getMonth() === i && tx.type !== 'transfer'; });
                    const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                    const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
                    return { name: m, รายรับ: inc, รายจ่าย: exp };
                });
            }, [transactions, selectedDate]);

            const analyticsData = useMemo(() => {
                const monthTx = transactions.filter(tx => { const txDate = new Date(tx.date); return tx.type === 'expense' && txDate.getFullYear() === selectedDate.getFullYear() && txDate.getMonth() === selectedDate.getMonth(); });
                const grouped = monthTx.reduce((acc, tx) => { if (!acc[tx.categoryId]) acc[tx.categoryId] = 0; acc[tx.categoryId] += tx.amount; return acc; }, {});
                return Object.keys(grouped).map(catId => {
                    const cat = CATEGORIES.find(c => c.id === catId) || { name: 'อื่นๆ', color: '#94a3b8' };
                    return { name: cat.name, value: grouped[catId], color: cat.color };
                }).sort((a, b) => b.value - a.value);
            }, [transactions, selectedDate]);

            const estimatedTaxData = useMemo(() => {
                const incomeThisMonth = transactions.filter(tx => { const txDate = new Date(tx.date); return tx.type === 'income' && txDate.getFullYear() === selectedDate.getFullYear() && txDate.getMonth() === selectedDate.getMonth(); }).reduce((sum, tx) => sum + tx.amount, 0);
                const annualizedIncome = incomeThisMonth * 12;
                const netIncome = Math.max(0, annualizedIncome - Math.min(annualizedIncome * 0.5, 100000) - 60000);
                let tax = 0; let calcNet = netIncome; let currentBracket = 'ยกเว้น';
                if (calcNet > 5000000) { tax += (calcNet - 5000000) * 0.35; calcNet = 5000000; currentBracket = '35%'; }
                if (calcNet > 2000000) { tax += (calcNet - 2000000) * 0.30; calcNet = 2000000; currentBracket = currentBracket === 'ยกเว้น' ? '30%' : currentBracket; }
                if (calcNet > 1000000) { tax += (calcNet - 1000000) * 0.25; calcNet = 1000000; currentBracket = currentBracket === 'ยกเว้น' ? '25%' : currentBracket; }
                if (calcNet > 750000) { tax += (calcNet - 750000) * 0.20; calcNet = 750000; currentBracket = currentBracket === 'ยกเว้น' ? '20%' : currentBracket; }
                if (calcNet > 500000) { tax += (calcNet - 500000) * 0.15; calcNet = 500000; currentBracket = currentBracket === 'ยกเว้น' ? '15%' : currentBracket; }
                if (calcNet > 300000) { tax += (calcNet - 300000) * 0.10; calcNet = 300000; currentBracket = currentBracket === 'ยกเว้น' ? '10%' : currentBracket; }
                if (calcNet > 150000) { tax += (calcNet - 150000) * 0.05; currentBracket = currentBracket === 'ยกเว้น' ? '5%' : currentBracket; }
                return { incomeThisMonth, annualizedIncome, netIncome, estimatedTax: tax, bracket: currentBracket };
            }, [transactions, selectedDate]);

            // --- HANDLERS ---
            const toggleInst = (key) => setExpandedInst(prev => ({ ...prev, [key]: !prev[key] }));
            const changeMonth = (offset) => { const newDate = new Date(selectedDate); newDate.setMonth(newDate.getMonth() + offset); setSelectedDate(newDate); };

            const openAddTransactionModal = () => {
                if(accounts.length === 0) { alert('กรุณาเพิ่มบัญชีก่อนทำรายการครับ'); return; }
                setTransactionType('expense'); setSelectedCategoryId('e_groceries'); setIsRecurringTx(false); setIsRecurringEndOfMonth(false); setRecurringDay(new Date().getDate()); setIsAddModalOpen(true);
            };

            const handleAddTransaction = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = parseFloat(formData.get('amount'));
                const accountId = parseInt(formData.get('accountId'));

                if (!amount || !accountId) return;

                if (transactionType === 'transfer') {
                    const fromAccountId = parseInt(formData.get('fromAccountId'));
                    const toAccountId = parseInt(formData.get('toAccountId'));
                    if (fromAccountId === toAccountId) { alert('ไม่สามารถโอนเข้าบัญชีเดียวกันได้'); return; }
                    const newTx = { id: Date.now(), type: 'transfer', amount, fromAccountId, toAccountId, date: new Date().toISOString() };
                    setTransactions([newTx, ...transactions]);
                    setAccounts(accounts.map(acc => {
                        if (acc.id === fromAccountId) return { ...acc, balance: acc.balance - amount };
                        if (acc.id === toAccountId) return { ...acc, balance: acc.balance + amount };
                        return acc;
                    }));
                } else {
                    if (!selectedCategoryId) return;
                    const newTx = { id: Date.now(), type: transactionType, amount, categoryId: selectedCategoryId, accountId, date: new Date().toISOString() };
                    setTransactions([newTx, ...transactions]);
                    setAccounts(accounts.map(acc => {
                        if (acc.id === accountId) return { ...acc, balance: transactionType === 'income' ? acc.balance + amount : acc.balance - amount };
                        return acc;
                    }));

                    if (isRecurringTx) {
                        const today = new Date();
                        const realCurrentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                        const newRec = {
                            id: Date.now() + 1, type: transactionType, amount, categoryId: selectedCategoryId, accountId,
                            recurringDay: isRecurringEndOfMonth ? -1 : (parseInt(recurringDay) || 1), lastProcessedMonth: realCurrentMonthStr
                        };
                        setRecurrings([...recurrings, newRec]);
                    }
                }
                setIsAddModalOpen(false);
            };

            const handleDeleteTransaction = () => {
                const tx = selectedTransaction;
                setAccounts(accounts.map(acc => {
                    if (tx.type === 'transfer') {
                        if (acc.id === tx.fromAccountId) return { ...acc, balance: acc.balance + tx.amount };
                        if (acc.id === tx.toAccountId) return { ...acc, balance: acc.balance - tx.amount };
                    } else {
                        if (acc.id === tx.accountId) return { ...acc, balance: tx.type === 'income' ? acc.balance - tx.amount : acc.balance + tx.amount };
                    }
                    return acc;
                }));
                setTransactions(transactions.filter(t => t.id !== tx.id));
                setSelectedTransaction(null);
            };

            const handleDeleteRecurring = (id) => {
                if (window.confirm('ต้องการยกเลิกการตั้งค่าประจำของรายการนี้ใช่ไหม? (ข้อมูลประวัติเดิมจะไม่หาย)')) {
                    setRecurrings(recurrings.filter(r => r.id !== id));
                }
            };

            const handleAccountTypeSelect = (typeId) => {
                setNewAccountType(typeId); setSelectedInstitution(null);
                setIsReserveAccount(!['credit', 'crypto_card', 'transit_card', 'travel_card', 'loan'].includes(typeId));
            };

            const handleAddAccount = (e) => {
                e.preventDefault();
                let balance = parseFloat(e.target.elements.balance.value || 0);
                const name = accountNameInput || 'บัญชีใหม่';
                if (['credit', 'crypto_card', 'loan'].includes(newAccountType) && balance > 0) balance = -balance;
                const finalReservePct = (['credit', 'crypto_card', 'transit_card', 'travel_card', 'loan'].includes(newAccountType) || !isReserveAccount) ? 0 : reservePercent;
                const accColor = selectedInstitution ? selectedInstitution.color : (['credit', 'crypto_card', 'loan'].includes(newAccountType) ? 'text-red-600' : 'text-indigo-600');
                const accBg = selectedInstitution ? selectedInstitution.bg : (['credit', 'crypto_card', 'loan'].includes(newAccountType) ? 'bg-rose-100' : 'bg-indigo-100');
                const accLogo = selectedInstitution ? selectedInstitution.short : name.charAt(0).toUpperCase();

                const newAcc = { id: Date.now(), name, balance, type: newAccountType, color: accColor, bg: accBg, logo: accLogo, reservePercentage: finalReservePct };
                setAccounts([...accounts, newAcc]);
                setAccountNameInput('');
                setIsAddAccountModalOpen(false);
            };

            const handleSaveBudget = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                let newBudgets = budgets.filter(b => b.month !== currentMonthStr);
                BUDGET_GROUPS.forEach(group => {
                    const limitVal = formData.get(`limit_${group.id}`);
                    if (limitVal && parseFloat(limitVal) > 0) newBudgets.push({ month: currentMonthStr, groupId: group.id, limit: parseFloat(limitVal) });
                });
                setBudgets(newBudgets); setIsBudgetModalOpen(false);
            };

            const handleAddGoal = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('name'); const target = parseFloat(formData.get('target')); const accountId = parseInt(formData.get('accountId'));
                const selectedIcon = GOAL_ICONS.find(i => i.id === selectedGoalIconId) || GOAL_ICONS[11];
                if (!name || !target || !accountId) return;
                setGoals([...goals, { id: Date.now(), name, target, accountId, icon: selectedIcon.icon, color: selectedIcon.color }]);
                setIsAddGoalModalOpen(false);
            };

            const handleInstall = () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { setDeferredPrompt(null); setIsInstallable(false); setShowInstallBanner(false); }); } };
            const handleResetApp = () => { if (window.confirm("การกระทำนี้จะล้างข้อมูลทั้งหมดในแอป (รายการและบัญชี) ยืนยันที่จะลบข้อมูลหรือไม่?")) { localStorage.clear(); window.location.reload(); } };

            const exportCSV = () => {
                const headers = ['วันที่', 'ประเภท', 'หมวดหมู่', 'บัญชี', 'จำนวนเงิน'];
                const rows = transactions.map(tx => {
                    const date = new Date(tx.date).toLocaleDateString('th-TH');
                    const typeStr = tx.type === 'income' ? 'รายรับ' : tx.type === 'expense' ? 'รายจ่าย' : 'โอนเงิน';
                    const cat = CATEGORIES.find(c => c.id === tx.categoryId)?.name || '-';
                    const acc = accounts.find(a => a.id === tx.accountId)?.name || '-';
                    const fromAcc = accounts.find(a => a.id === tx.fromAccountId)?.name || '-';
                    const toAcc = accounts.find(a => a.id === tx.toAccountId)?.name || '-';
                    return `"${date}","${typeStr}","${tx.type === 'transfer' ? 'โอนเงิน/จ่ายบิล' : cat}","${tx.type === 'transfer' ? `${fromAcc} -> ${toAcc}` : acc}",${tx.amount}`;
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows].join('\n')));
                link.setAttribute("download", `transactions_${currentMonthStr}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // --- RENDER VIEWS ---
            const renderHome = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-gradient-to-br from-indigo-900 to-slate-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <div className="flex justify-between items-start mb-6">
                                <div><p className="text-indigo-300 text-xs font-bold uppercase tracking-wider mb-1">ความมั่งคั่งสุทธิ</p><h2 className="text-3xl font-extrabold">฿ {netWorth.toLocaleString()}</h2></div>
                                <div className="bg-white/10 p-2 rounded-xl border border-white/10"><i className="fa-solid fa-arrow-trend-up text-xl text-teal-400"></i></div>
                            </div>
                            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-white/5">
                                <div className="flex justify-between items-center mb-1"><span className="text-xs font-bold text-indigo-200">เงินสำรองฉุกเฉิน (Runway)</span><span className="text-[10px] bg-teal-500/20 text-teal-300 px-2 py-0.5 rounded-full">ปลอดภัย</span></div>
                                <div className="flex items-baseline gap-1"><span className="text-2xl font-bold">{runwayMonths}</span><span className="text-xs text-indigo-300">เดือน</span></div>
                                <div className="mt-2 w-full bg-indigo-950 h-1.5 rounded-full overflow-hidden"><div className="bg-teal-400 h-full" style={{ width: `${Math.min(100, (parseFloat(runwayMonths)/12)*100)}%` }}></div></div>
                                <p className="text-[9px] text-indigo-400 mt-2">อิงตามค่าใช้จ่าย ฿{monthlyBurnRate.toLocaleString()}/ด.</p>
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center bg-white p-2 rounded-2xl border border-slate-100 shadow-sm">
                        <button onClick={() => changeMonth(-1)} className="p-2 text-slate-400"><i className="fa-solid fa-chevron-left text-lg"></i></button>
                        <span className="font-bold text-slate-700">{displayMonthName}</span>
                        <button onClick={() => changeMonth(1)} className="p-2 text-slate-400"><i className="fa-solid fa-chevron-right text-lg"></i></button>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between cursor-pointer hover:border-indigo-200" onClick={() => setIsBudgetModalOpen(true)}>
                            <div className="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-lg mb-3"><i className="fa-solid fa-bullseye"></i></div>
                            <div><h3 className="font-bold text-slate-800 text-sm">ตั้งงบประมาณ</h3><p className="text-[10px] text-slate-400 mt-1">คุมรายจ่ายแต่ละหมวด</p></div>
                        </div>
                        <div className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between cursor-pointer hover:border-indigo-200" onClick={() => setIsRecurringModalOpen(true)}>
                            <div className="w-10 h-10 rounded-full bg-teal-50 text-teal-600 flex items-center justify-center text-lg mb-3"><i className="fa-solid fa-clock-rotate-left"></i></div>
                            <div><h3 className="font-bold text-slate-800 text-sm">รายการประจำ</h3><p className="text-[10px] text-slate-400 mt-1">{recurrings.length} รายการ (บันทึกออโต้)</p></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-slate-800">งบประมาณที่ตั้งไว้</h3></div>
                        <div className="space-y-4">
                            {currentMonthBudgetData.map(b => (
                                <div key={b.id}>
                                    <div className="flex justify-between text-xs mb-1 font-bold text-slate-600"><span>{b.icon} {b.name}</span><span>฿ {b.spent.toLocaleString()} / {b.limit.toLocaleString()}</span></div>
                                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div className={`${b.isOver ? 'bg-rose-500' : 'bg-indigo-600'} h-full`} style={{ width: `${b.percent}%` }}></div></div>
                                </div>
                            ))}
                            {currentMonthBudgetData.length === 0 && <div className="text-center py-4 text-slate-400 text-xs italic">ยังไม่มีการตั้งงบประมาณ</div>}
                        </div>
                    </div>
                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-slate-800">รายการล่าสุด</h3><button onClick={() => setActiveTab('analytics')} className="text-indigo-600 text-sm font-medium flex items-center gap-1">ดูทั้งหมด <i className="fa-solid fa-chevron-right text-xs"></i></button></div>
                        <div className="space-y-3">
                            {transactions.slice(0, 5).map(tx => {
                                if (tx.type === 'transfer') {
                                    const fromAcc = accounts.find(a => a.id === tx.fromAccountId); const toAcc = accounts.find(a => a.id === tx.toAccountId);
                                    return (
                                        <div key={tx.id} onClick={() => setSelectedTransaction(tx)} className="flex justify-between items-center p-2 -mx-2 hover:bg-slate-50 rounded-xl transition-colors cursor-pointer">
                                            <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full flex items-center justify-center text-lg bg-blue-50"><i className="fa-solid fa-right-left text-blue-500 text-sm"></i></div><div><p className="text-sm font-bold text-slate-700">โอนเงิน / จ่ายบิล</p><p className="text-[10px] text-slate-400">{fromAcc?.name} <i className="fa-solid fa-arrow-right text-[8px]"></i> {toAcc?.name}</p></div></div>
                                            <span className="text-sm font-bold text-slate-600">฿{tx.amount.toLocaleString()}</span>
                                        </div>
                                    );
                                }
                                const cat = CATEGORIES.find(c => c.id === tx.categoryId);
                                return (
                                    <div key={tx.id} onClick={() => setSelectedTransaction(tx)} className="flex justify-between items-center p-2 -mx-2 hover:bg-slate-50 rounded-xl transition-colors cursor-pointer">
                                        <div className="flex items-center gap-3"><div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg ${tx.type === 'income' ? 'bg-green-50' : 'bg-slate-50'}`}>{cat?.icon || '❓'}</div><div><p className="text-sm font-bold text-slate-700 flex items-center gap-1">{cat?.name || 'อื่นๆ'} {tx.note === 'รายการประจำอัตโนมัติ' && <i className="fa-solid fa-bolt text-[10px] text-amber-500"></i>}</p><p className="text-[10px] text-slate-400">{new Date(tx.date).toLocaleDateString('th-TH')}</p></div></div>
                                        <span className={`text-sm font-bold ${tx.type === 'income' ? 'text-green-600' : 'text-slate-800'}`}>{tx.type === 'income' ? '+' : '-'} ฿{tx.amount.toLocaleString()}</span>
                                    </div>
                                );
                            })}
                            {transactions.length === 0 && <div className="text-center py-4 text-slate-400 text-xs italic">ยังไม่มีการบันทึกรายการ</div>}

                                    </div></div>
                                    <div><label className="block text-xs font-bold text-slate-500 mb-1">จำนวนเงินเป้าหมาย (บาท)</label><input type="number" name="target" placeholder="0" required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                    <div><label className="block text-xs font-bold text-slate-500 mb-1">ผูกกับบัญชีที่ใช้เก็บเงิน</label><select name="accountId" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500">{accounts.filter(a => !['credit', 'crypto_card', 'loan'].includes(a.type)).map(acc => (<option key={acc.id} value={acc.id}>{acc.name} (ยอดปัจจุบัน ฿{acc.balance.toLocaleString()})</option>))}</select></div>
                                    <button type="submit" className="w-full py-4 mt-6 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">บันทึกเป้าหมาย</button>
                                </form>
                            </div></div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
